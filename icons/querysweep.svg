<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2f6bed"/>
      <stop offset="1" stop-color="#10c0d0"/>
    </linearGradient>
  </defs>

  <!-- app-icon squircle -->
  <rect x="0" y="0" width="256" height="256" rx="56" fill="url(#bg)"/>

  <!-- three color-coded result rows -->
  <rect x="58" y="80"  width="140" height="26" rx="13" fill="#ff7a8a"/>
  <rect x="58" y="115" width="140" height="26" rx="13" fill="#5fd38a"/>
  <rect x="58" y="150" width="140" height="26" rx="13" fill="#6aa8ff"/>

  <!-- sweep swoosh across the rows -->
  <path d="M46 200 C 110 196, 150 168, 212 60"
        fill="none" stroke="#ffffff" stroke-width="14"
        stroke-linecap="round" opacity="0.97"/>
  <!-- arrowhead at the swoosh tip -->
  <path d="M212 60 L 185 70 L 201 90 Z" fill="#ffffff"/>
</svg>
